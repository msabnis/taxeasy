name: TaxEase UK CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: "24"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Lint backend
        run: cd backend && npm run lint

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Lint frontend
        run: cd frontend && npm run lint

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taxease_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Run migrations
        run: cd backend && npm run migrate
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taxease_test

      - name: Run tests with coverage
        run: cd backend && npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taxease_test
          JWT_SECRET: ci-test-jwt-secret-32-chars-minimum-ok
          SESSION_SECRET: ci-test-session-secret-32-chars-min
          HMRC_BASE_URL: https://test-api.service.hmrc.gov.uk
          HMRC_CLIENT_ID: test-client-id
          HMRC_CLIENT_SECRET: test-client-secret
          HMRC_REDIRECT_URI: http://localhost:3001/auth/hmrc/callback
          SHOPIFY_API_KEY: test-shopify-key
          SHOPIFY_API_SECRET: test-shopify-secret
          SHOPIFY_WEBHOOK_SECRET: test-webhook-secret
          SHOPIFY_APP_URL: http://localhost:3001
          FRONTEND_URL: http://localhost:5173
          GOCARDLESS_SECRET_ID: test-gc-id
          GOCARDLESS_SECRET_KEY: test-gc-key
          GOCARDLESS_BASE_URL: https://ob.sandbox.gocardless.com/api/v2

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build
        run: cd frontend && npm run build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit backend
        run: cd backend && npm install && npm audit --audit-level=high
        continue-on-error: true

      - name: Audit frontend
        run: cd frontend && npm install && npm audit --audit-level=high
        continue-on-error: true
